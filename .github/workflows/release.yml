name: Release

# This workflow governs the path to `main`:
#   - On pull request to `main`: validation gate (lint + tests + build, no deploy).
#   - On push to `main` (i.e. a merged release PR): tag a semver, publish a GitHub
#     Release with auto-generated notes, and trigger production deploys on Render
#     for both the backend web service and the frontend static site.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write   # needed by softprops/action-gh-release to create the release
  pull-requests: read

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Validation gate — runs on every PR to `main` and again on push to `main`.
  # Reuses the same commands as backend.yml + frontend.yml so the gate matches
  # what developers see on `develop`.
  # ---------------------------------------------------------------------------
  validate-backend:
    name: Validate backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:test_password@localhost:5432/test_db
      TEST_DATABASE_URL: postgresql://postgres:test_password@localhost:5432/test_db
      SECRET_KEY: test-secret-key-for-release-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx ruff
      - name: Lint with ruff
        run: |
          cd backend
          ruff check app/ tests/
      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  validate-frontend:
    name: Validate frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint with ESLint
        run: pnpm lint
      - name: Check formatting with Prettier
        run: pnpm format:check
      - name: Build
        run: pnpm build
        env:
          # Production build uses the deployed backend URL. For the PR gate
          # we use a placeholder; the production value is supplied at deploy time.
          VITE_API_URL: https://restaurant-backend.onrender.com

  # ---------------------------------------------------------------------------
  # Gate summary — fast-fail. The PR check status reflects both jobs above.
  # ---------------------------------------------------------------------------
  gate:
    name: Release gate
    needs: [validate-backend, validate-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Gate passed
        run: echo "All validation jobs passed; PR is eligible for merge to main."

  # ---------------------------------------------------------------------------
  # Release — only on push to `main` (i.e. a merged release PR).
  # Tag with semver computed from the previous tag, then publish a GitHub
  # Release with auto-generated notes.
  # ---------------------------------------------------------------------------
  tag:
    name: Compute next version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: gate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      is_first: ${{ steps.semver.outputs.is_first }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history to read previous tags
      - name: Compute next semver
        id: semver
        shell: bash
        run: |
          set -euo pipefail
          # Fetch all tags (checkout@v4 with fetch-depth 0 still misses lightweight tags)
          git fetch --tags --force
          prev=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$prev" ]; then
            # First release. Aligns with `frontend/package.json` "version": "1.0.0".
            version="v1.0.0"
            is_first="true"
          else
            # Build the version parts of the previous tag (strip a leading 'v').
            base="${prev#v}"
            major="${base%%.*}"
            rest="${base#*.}"
            minor="${rest%%.*}"
            patch="${rest#*.}"

            # Range of commits since the previous tag. We scan their subjects for
            # Conventional Commit prefixes to decide the bump level:
            #   - any `BREAKING CHANGE:` or `!:` suffix  -> major
            #   - any `feat:` / `feat(scope):`              -> minor
            #   - otherwise (fix:, docs:, chore:, ...)    -> patch
            range="${prev}..HEAD"
            bump="patch"
            while IFS= read -r subject; do
              if echo "$subject" | grep -qE '(^|: |\()BREAKING CHANGE(:|\!)|!: '; then
                bump="major"; break
              fi
              if echo "$subject" | grep -qE '^feat(\(.+\))?:'; then
                bump="minor"
              fi
            done < <(git log --format='%s%n%b%n---END---' "$range" | tr '\n' '\f' | sed 's/\f---END---\f/\n/g')

            case "$bump" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
            esac
            version="v${major}.${minor}.${patch}"
            is_first="false"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "is_first=${is_first}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${version} (prev=${prev:-none}, bump=${bump:-first})"

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.semver.outputs.version }}"
          git tag -a "${version}" -m "Release ${version}"
          git push origin "${version}"

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate release notes
        id: notes
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release.yml
          tag: ${{ needs.tag.outputs.version }}
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Backend production deploy — trigger Render deploy hook for the backend
  # web service. Reuses the same secrets as `backend.yml` (RENDER_API_KEY +
  # RENDER_SERVICE_ID). For release deploys we point at a separate production
  # service via RENDER_PROD_SERVICE_ID so develop and main deploys are
  # independent.
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy backend to Render (production)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy via hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          set -euo pipefail
          if [ -z "${RENDER_DEPLOY_HOOK}" ]; then
            echo "::error::RENDER_DEPLOY_HOOK secret is not set; cannot deploy backend to production."
            exit 1
          fi
          curl -X POST "${RENDER_DEPLOY_HOOK}" --fail-with-body

  # ---------------------------------------------------------------------------
  # Frontend production deploy — Vercel.
  # Requires VERCEL_TOKEN (from Vercel Account → Settings → Tokens) and
  # VERCEL_PROJECT_ID (from Vercel project dashboard → Settings → Project ID).
  # If Vercel is already connected to the repo with auto-deploy on `main`,
  # this job is optional — pushes to `main` will trigger Vercel deploys directly.
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy frontend to Vercel
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Enable corepack
        run: corepack enable
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "::warning::VERCEL_TOKEN secret is not set; skipping Vercel deploy."
            echo "If Vercel is linked to the repo, auto-deploy on main will still work."
            exit 0
          fi
          npx vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"
          npx vercel build --prod --token="${VERCEL_TOKEN}"
          npx vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}"

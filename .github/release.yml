# Auto-generated release notes configuration.
# Used by `release-drafter/release-drafter` in `.github/workflows/release.yml`
# to classify merged pull requests into categories when publishing a GitHub
# Release on push to `main`.

changelog:
  exclude:
    labels:
      - ignore-for-release
      - docs
      - dependency
    authors:
      - dependabot
      - renovate-bot

categories:
  - title: 🚀 Features
    labels:
      - feature
      - enhancement
  - title: 🐛 Bug Fixes
    labels:
      - bug
      - fix
  - title: 🎨 UI / UX
    labels:
      - ui
      - design
  - title: ⚡ Performance
    labels:
      - performance
      - perf
  - title: 📚 Documentation
    labels:
      - documentation
  - title: 🧹 Chores & Refactor
    labels:
      - chore
      - refactor
      - dependencies
  - title: 🔒 Security
    labels:
      - security

# Default PR label → "Chores & Refactor" bucket when no explicit label is set.
template: |
  ## Changes

  $CHANGES

  ## What's new in $PREVIOUS_TAG

  See the diff between [$PREVIOUS_TAG and $RESOLVED_VERSION](https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...$RESOLVED_VERSION).

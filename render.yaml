services:
  - type: web
    name: restaurant-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: restaurant-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: PROJECT_NAME
        value: Restaurant Management System
    healthCheckPath: /api/v1/health
    autoDeploy: false

databases:
  - name: restaurant-db
    plan: starter
    databaseName: restaurant_db
    user: restaurant_user

services:
  # Backend — FastAPI web service.
  - type: web
    name: restaurant-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: restaurant-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: PROJECT_NAME
        value: Restaurant Management System
    # NOTE: the FastAPI app exposes `/health` at root (see backend/app/main.py),
    # not under `/api/v1/*`. Deployed URL: https://restaurant-management-system-1-2sfc.onrender.com/health
    healthCheckPath: /health
    autoDeploy: false

# Frontend is deployed on Vercel (see vercel.json). The backend render.yaml only
# manages the backend web service and its database.
# Frontend production URL: https://restaurant-management-system.vercel.app (update as needed)

databases:
  - name: restaurant-db
    plan: starter
    databaseName: restaurant_db
    user: restaurant_user

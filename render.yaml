services:
  # Backend — FastAPI web service.
  - type: web
    name: restaurant-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: restaurant-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: PROJECT_NAME
        value: Restaurant Management System
    # NOTE: the FastAPI app exposes `/health` at root (see backend/app/main.py),
    # not under `/api/v1/*`. Deployed URL: https://restaurant-backend.onrender.com/health
    healthCheckPath: /health
    autoDeploy: false

  # Frontend — Vite-built static site served by Render's CDN.
  - type: web
    name: restaurant-frontend
    runtime: static
    buildCommand: cd frontend && pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        # Same-origin /api proxy in `vite.config.js` is dev-only; in production
        # the SPA must target the deployed backend web service URL.
        value: https://restaurant-backend.onrender.com
    headers:
      # Cache hashed assets aggressively, never cache the entry HTML.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache
    # SPA fallback so client-side hash routing works on deep links.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: false

databases:
  - name: restaurant-db
    plan: starter
    databaseName: restaurant_db
    user: restaurant_user
